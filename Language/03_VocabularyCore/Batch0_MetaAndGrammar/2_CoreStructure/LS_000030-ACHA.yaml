predecessor:
  source_language: swahili
  source_word: acha
  derivation_notes: |
    Phonesthetically motivated construction.
    Designed to feel sharp, forceful, and immediate.
    Semantic parallels include imperative stop-forms across languages,
    but it is related to the Swahili word.

constraints:
  taboo: false
  register:
    - neutral
    - forceful
    - urgent
  ambiguity_allowed: false

  forbidden_uses:
    - Mere completion (“finish” → separate term)
    - Logical negation (“not” → Z¬ / ZONZ)
    - Passive non-action (“stay” → KUKEI)
    - Polite refusal (“no” → NO)
    - Causal prevention (“make stop” → DU + ACHA)

usage:
  examples: []
  context_clues:
    - Often used as an imperative or sharp interruption.
    - Implies immediacy and authority, not gradual cessation.
    - Can apply to actions, processes, or behaviors.
  notes: |
    ACHA is about interruption, not conclusion.
    It answers “stop that” or “cease now”, not “is it finished”.
    Tone can be urgent, corrective, or protective depending on context.


