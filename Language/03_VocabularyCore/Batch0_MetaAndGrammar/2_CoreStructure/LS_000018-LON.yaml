grammar:
  part_of_speech:
    - verb
    - stative_verb
  transitivity: intransitive
  valency: 1
  classifiers_allowed:
    - Za
    - Ze
    - Zi
    - Zooo
    - Zaw
  derivation_rules:
    allows_compounding: true
    allows_inflection: true

predecessor:
  source_language: toki pona
  source_word: lon
  derivation_notes: |
    Inherited existential minimalism.
    Covers existence and state without encoding identity,
    location, truth, or permanence by itself.

constraints:
  taboo: false
  register:
    - neutral
    - formal
    - casual
  ambiguity_allowed: true

  forbidden_uses:
    - Identity assertion (“X is Y” as equivalence → use SAWA or structure)
    - Location without context (“is at” → pair with ISI / IBI / Ze)
    - Truth-value assertion (“it is true” → use evidentiality)
    - Ownership / possession (“have”)
    - Temporal permanence (“always is” without modifiers)

usage:
  examples: []
  context_clues:
    - Asserts that something exists or holds in a given context.
    - Meaning sharpens via classifiers and surrounding structure.
    - Commonly used with Zaw (time) or Ze (place) for anchoring.
  notes: |
    LON asserts existence or state, not identity.
    It answers “does it exist / is it so” rather than “what is it”.
    Overloading is avoided by design; structure does the rest.


