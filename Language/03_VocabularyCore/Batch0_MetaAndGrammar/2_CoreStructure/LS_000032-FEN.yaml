grammar:
  part_of_speech:
    - verb
    - terminal_marker
  transitivity: null
  valency: null
  classifiers_allowed:
    - Zaw     # temporal end / after
    - Ze      # endpoint / finish line / destination
    - Zooo    # final concept / outcome
    - Zu      # resulting state or quality
    - Za      # agent at completion
  derivation_rules:
    allows_compounding: true
    allows_inflection: true

predecessor:
  source_language: null
  source_word: null
  derivation_notes: |
    Core meaning is “terminal boundary”.
    Axis is selected via classifiers:
      Zaw  FEN → temporal end / after
      Ze   FEN → endpoint / finish line
      Zooo FEN → final concept or result
      Zu   FEN → what something ended up as
    Designed as the symmetric counterpart to KOMESAWH.

constraints:
  taboo: false
  register:
    - neutral
    - formal
    - narrative
  ambiguity_allowed: true

  forbidden_uses:
    - Mere interruption (“stop” → ACHA)
    - Continuation halt without completion
    - Existence assertion (“be” → LON)
    - Cause or justification (“because” → POKEI)
    - Temporal sequencing alone (“then” → DON)

usage:
  examples: []
  context_clues:
    - Often paired with KUWA to describe full transformation arcs.
    - Classifier determines whether focus is time, place, or result.
    - Strong narrative and procedural utility.
  notes: |
    FEN defines where something ends, not why or how.
    It answers “to where / to what state / until when”.
    Causes, success, or evaluation must be expressed separately.



