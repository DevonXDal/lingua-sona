grammar:
  part_of_speech:
    - verb
    - instrumental_verb
  transitivity: transitive
  valency: 2              # user → tool / resource
  classifiers_allowed:
    - Za
    - Zi
    - Zooo
  derivation_rules:
    allows_compounding: true
    allows_inflection: true

predecessor:
  source_language: toki pona
  source_word: kepeken
  derivation_notes: |
    Encodes purposeful application of an object or concept.
    Bridges possession (YO) and action (DU) without collapsing into either.

constraints:
  taboo: false
  register:
    - neutral
    - formal
    - casual
  ambiguity_allowed: true

  forbidden_uses:
    - Generic action without an instrument (“do” → DU)
    - Possession without action (“have” → YO)
    - Causal enforcement (“make” → DU / POKEI)
    - Identity or state change (“become” → KUWA)
    - Abstract preference (“like / want”)

usage:
  examples: []
  context_clues:
    - Requires a resource, tool, or means.
    - Implies purposeful engagement, not mere contact.
    - Often pairs naturally with Zi or Zooo classifiers.
  notes: |
    OOOS specifies *how* an action is carried out.
    It does not assert success, ownership, or outcome.
    Outcomes and causation are expressed separately.


