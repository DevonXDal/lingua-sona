grammar:
  part_of_speech:
    - verb
    - origin_marker
  transitivity: null
  valency: null
  classifiers_allowed:
    - Zaw     # temporal start / before
    - Ze      # spatial origin / starting location
    - Zooo    # conceptual origin / initial state
    - Zu      # qualitative starting condition
    - Za      # agent at start (who began)
  derivation_rules:
    allows_compounding: true
    allows_inflection: true

predecessor:
  source_language: spanish
  source_word: comenzar
  derivation_notes: |
    Core meaning is “boundary of origin”.
    Specific readings are selected by classifiers:
      Zaw  KOMESAWH → temporal beginning / before
      Ze   KOMESAWH → starting place / origin
      Zooo KOMESAWH → initial concept or state
      Zu   KOMESAWH → what something started as
    Complements KUWA by defining the pre-change state.

constraints:
  taboo: false
  register:
    - neutral
    - formal
    - narrative
  ambiguity_allowed: true

  forbidden_uses:
    - Completion or termination (“finish” → separate term)
    - Mere existence (“be” → LON)
    - Action without origin (“do” → DU)
    - Result or consequence (“therefore” → BASI)
    - Temporal sequencing without reference (“then” → DON)

usage:
  examples: []
  context_clues:
    - Often paired with KUWA to express transformation arcs.
    - Classifier choice determines whether the focus is time, place, or state.
    - Can anchor narratives, processes, or identity changes.
  notes: |
    KOMESAWH defines where something starts, not what it becomes.
    It answers “from where / from when / from what state”.
    Endpoints, outcomes, and causes must be expressed separately.


