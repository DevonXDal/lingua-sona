grammar:
  part_of_speech:
    - verb
    - action_verb
  transitivity: transitive
  valency: 2              # actor → action / object
  classifiers_allowed:
    - Za
    - Zi
    - Zo
    - Zooo
  derivation_rules:
    allows_compounding: true
    allows_inflection: true

predecessor:
  source_language: proto
  source_word: null
  derivation_notes: |
    Universal light verb concept.
    Serves as a general-purpose action carrier,
    with specificity supplied by objects or compounds.

constraints:
  taboo: false
  register:
    - neutral
    - formal
    - casual
  ambiguity_allowed: true

  forbidden_uses:
    - Existence or state (“be” → use LON)
    - Causation (“make happen” → use POKEI + DU if needed)
    - Result or conclusion (“so” → use BASI)
    - Intent or desire (“want” to be handled separately)
    - Passive implication without structure

usage:
  examples: []
  context_clues:
    - Requires an action target, object, or implied task.
    - Often combines with Zi/Zooo terms to specify what is done.
    - Can function as a light verb for complex actions.
  notes: |
    DU asserts action, not success, cause, or outcome.
    It answers “what is being done”, not “why” or “what results”.
    Results, intent, and evaluation are expressed elsewhere.


