id: LS-000024


sona:
  latin: DAWH
  term: 
  ipa: /dɑ/


classification:
  root_type: CV       # reception / acquisition root
  core_status: core
  frequency_rank: null
  relevance_batch: 1
  cluster_group: core-structure

semantics:
  primary: receive
  secondary:
    - take
    - accept transfer
  extended:
    - acquisition framing
    - intake of possession or control
  domain_tags:
    - transfer
    - possession
    - relation
    - action

multilingual:
  english:
    - take
    - receive
  toki_pona:
    - kama jo
  french:
    - prendre
    - recevoir
  spanish:
    - tomar
    - recibir
  chinese:
    - 拿
    - 接收
  swahili:
    - pokea
    - chukua
  german:
    - nehmen
    - erhalten
  hindi:
    - लेना
    - प्राप्त करना
  bengali:
    - নেওয়া
    - পাওয়া
  portuguese:
    - pegar
    - receber
  ukrainian:
    - брати
    - отримувати
  russian:
