grammar:
  part_of_speech:
    - verb
    - transfer_verb
  transitivity: transitive
  valency: 2              # receiver → item (source optional)
  classifiers_allowed:
    - Za
    - Zi
    - Zooo
  derivation_rules:
    allows_compounding: true
    allows_inflection: true

predecessor:
  source_language: constructed
  source_word: null
  derivation_notes: |
    Designed as the inverse of DAWH.
    Encodes reception or acquisition without implying consent,
    force, legality, or reciprocity.

constraints:
  taboo: false
  register:
    - neutral
    - formal
    - casual
  ambiguity_allowed: true

  forbidden_uses:
    - Forced acquisition (“seize”, “steal” without context)
    - Creation (“make” → PALI)
    - Mere possession without transfer (“have” → YO)
    - Causal imposition (“make someone take” → DU / POKEI)
    - Obligation or expectation framing

usage:
  examples: []
  context_clues:
    - May imply a giver, environment, or source, but not required.
    - Does not assert willingness, fairness, or legality.
    - Often pairs naturally with DAWH in transactional contexts.
  notes: |
    TAWH asserts reception, not entitlement or effort.
    It answers “who got what”, not “why” or “whether it was right”.
    It did also come somewhat from 'ta' in Swedish and Norweigan


