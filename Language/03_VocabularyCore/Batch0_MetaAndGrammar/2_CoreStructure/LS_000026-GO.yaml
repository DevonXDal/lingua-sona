grammar:
  part_of_speech:
    - verb
    - motion_verb
  transitivity: intransitive
  valency: 1              # mover (destination optional via structure)
  classifiers_allowed:
    - Za
    - Ze
    - Zaw
  derivation_rules:
    allows_compounding: true
    allows_inflection: true

predecessor:
  source_language: proto
  source_word: null
  derivation_notes: |
    Encodes motion through space without implying destination,
    purpose, arrival, or transformation.

constraints:
  taboo: false
  register:
    - neutral
    - formal
    - casual
  ambiguity_allowed: true

  forbidden_uses:
    - Change of state (“become” → KUWA)
    - Action without movement (“do” → DU)
    - Arrival or completion (“reach / arrive” to be separate)
    - Direction without motion (“here / there” → ISI / IBI)
    - Metaphorical logical progression (“then” → DON)

usage:
  examples: []
  context_clues:
    - Implies spatial displacement of an entity.
    - Destination, origin, or purpose must be supplied separately.
    - Often pairs with ISI / IBI / Ze for spatial anchoring.
  notes: |
    GO asserts motion, not arrival or success.
    It answers “is it moving”, not “where to”, “why”, or “what changed”.


