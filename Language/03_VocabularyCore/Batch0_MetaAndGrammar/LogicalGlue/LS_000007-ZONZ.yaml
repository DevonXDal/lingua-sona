predecessor:
  source_language: null
  source_word: null
  derivation_notes: |
    Constructed internally from Zon (meta-reference) + Z卢 (negation).
    Represents negation of the word itself, not negation of a clause.

constraints:
  taboo: false
  register:
    - technical
    - formal
    - logical
  ambiguity_allowed: false

  forbidden_uses:
    - Clause-level negation (use Z卢 + classifier or explicit negators)
    - Emotional or pragmatic negation ("no!", "nah")
    - Contrastive discourse (use BAHW)
    - Causal or conditional logic (use POKEI / SI)
    - Use without an explicit referent in scope

usage:
  examples: []
  context_clues:
    - Must refer to a specific word, classifier, or defined term.
    - Signals exclusion or logical complement, not disbelief.
    - Common in formal logic, definitions, and programming contexts.
  notes: |
    ZONZ operates strictly at the meta level.
    It negates the concept of a word, not its truth value in a sentence.
    Think: set subtraction, type exclusion, or semantic NOT.



