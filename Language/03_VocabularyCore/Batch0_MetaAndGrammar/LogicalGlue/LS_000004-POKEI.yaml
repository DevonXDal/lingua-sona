constraints:
  taboo: false
  register:
    - neutral
    - formal
    - explanatory
  ambiguity_allowed: false

  forbidden_uses:
    - Temporal sequencing ("then", "after")
    - Contrastive pivot (use BAHW instead)
    - Evidential substitution (does NOT replace TA/TE/TI/etc.)
    - Standalone answer particle ("because." as a full response)

usage:
  examples: []
  context_clues:
    - Introduces the cause or justification for a preceding or following clause.
    - Does not negate, contrast, or soften—purely explanatory.
    - Often pairs naturally with evidentiality markers in formal speech.
  notes: |
    POKEI asserts causation, not opinion.
    When causality is uncertain, combine with weaker evidentiality (e.g., TAW).


