grammar:
  part_of_speech:
    - verb
    - transformational_verb
  transitivity: intransitive
  valency: 2              # entity → resulting state
  classifiers_allowed:
    - Za
    - Zi
    - Zu
    - Zooo
  derivation_rules:
    allows_compounding: true
    allows_inflection: true

predecessor:
  source_language: swahili
  source_word: kuwa
  derivation_notes: |
    Encodes transition between states without asserting cause,
    intent, or success.
    Focuses on change itself, not the mechanism behind it.

constraints:
  taboo: false
  register:
    - neutral
    - formal
    - casual
  ambiguity_allowed: true

  forbidden_uses:
    - Existence without change (“be” → use LON)
    - Action without transformation (“do” → use DU)
    - Logical result (“therefore” → use BASI)
    - Causal explanation (“because” → use POKEI)
    - Instant identity equivalence (“is the same as” → use SAWA or structure)

usage:
  examples: []
  context_clues:
    - Implies a before-state and an after-state.
    - Does not specify how or why the change occurred.
    - Resulting state is defined by complements or classifiers.
  notes: |
    KUWA marks transformation, not permanence.
    It answers “what did it become”, not “why” or “who caused it”.
    Cause, intent, and evaluation must be expressed separately.


