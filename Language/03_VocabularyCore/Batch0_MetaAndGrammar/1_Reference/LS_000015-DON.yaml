  derivation_notes: |
    Encodes temporal succession only.
    Deliberately separated from logical consequence (BASI).

constraints:
  taboo: false
  register:
    - neutral
    - formal
    - narrative
  ambiguity_allowed: false

  forbidden_uses:
    - Logical result or inference (“so / therefore” → use BASI)
    - Causal linkage (“because” → use POKEI)
    - Conditional chaining (“if… then” logic → SI + BASI)
    - Contrastive discourse (“but” → use BAHW)
    - Present-time anchoring (“now” → use SASA)

usage:
  examples: []
  context_clues:
    - Refers to an event occurring after a prior time point.
    - Requires an established temporal reference.
    - Common in narration, instructions, and procedural steps.
  notes: |
    DON is strictly temporal.
    It sequences events without asserting causality,
    implication, or logical necessity.


