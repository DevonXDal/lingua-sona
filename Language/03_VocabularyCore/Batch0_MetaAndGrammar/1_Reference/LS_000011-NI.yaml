predecessor:
  source_language: toki pona
  source_word: ni
  derivation_notes: |
    Inherited demonstrative minimalism.
    Distance, emphasis, and scope are handled via context,
    classifiers, and optional modifiers rather than inflection.

constraints:
  taboo: false
  register:
    - neutral
    - formal
    - casual
  ambiguity_allowed: true

  forbidden_uses:
    - Personal pronoun substitution ("I", "you", "they")
    - Temporal reference ("now", "then")
    - Logical variable binding (use formal symbols or definitions)
    - Standalone abstract reference without context
    - Emphatic pointing without a scoped referent

usage:
  examples: []
  context_clues:
    - Must refer to something present in context, discourse, or perception.
    - Classifiers strongly disambiguate referent type (Zi NI = this thing).
    - Distance (this vs that) is inferred, not encoded.
  notes: |
    NI is intentionally underspecified.
    Precision emerges from context, gesture, discourse position,
    or classifier use—not from grammatical distance marking.
    This keeps the term count low and usage flexible.


