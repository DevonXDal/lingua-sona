  derivation_notes: |
    Universal negative response particle.
    Distinct by design from grammatical or logical negation mechanisms.

constraints:
  taboo: false
  register:
    - neutral
    - formal
    - casual
  ambiguity_allowed: false

  forbidden_uses:
    - Clause-level negation (use Z¬ or explicit negators)
    - Logical NOT operator (use ZONZ or Z¬ as appropriate)
    - Contrastive discourse (use BAHW)
    - Causal denial ("not because")
    - Emotional intensifier without context

usage:
  examples: []
  context_clues:
    - Typically used as a standalone response.
    - Rejects or denies a proposal, request, or question.
    - Does not assert falsity of a statement.
  notes: |
    NO is a conversational rejection, not a truth-value operator.
    Factual negation still requires grammatical or logical structure.



