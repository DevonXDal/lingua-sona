usage:
  examples: []
  context_clues:
    - Usually placed near the clause it scopes over (often clause-initial).
    - Signals speaker uncertainty; does not claim fact-status.
    - Can coexist with evidentiality; typically pairs with weaker markers (e.g., TAW/TOOO).
  notes: |
    LADA introduces uncertainty about truth, outcome, or commitment.
    It is epistemic (knowledge/likelihood), not deontic (permission/obligation).


