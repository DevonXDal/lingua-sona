constraints:
  taboo: false
  register:
    - neutral
    - formal
    - casual
  ambiguity_allowed: false

  forbidden_uses:
    - Truth assertion in declarative sentences
    - Replacement for evidentiality markers
    - Logical operator ("true", "1")
    - Causal or result confirmation ("so", "therefore")
    - Sarcastic or ironic inversion without explicit context

usage:
  examples: []
  context_clues:
    - Typically used as a standalone response or clause-initial acknowledgment.
    - Confirms agreement or acceptance, not factual certainty.
    - Scope is pragmatic, not logical.
  notes: |
    YA answers a question or accepts a proposition pragmatically.
    It does not assert that a statement is objectively true.
    Objective truth still requires evidentiality.


