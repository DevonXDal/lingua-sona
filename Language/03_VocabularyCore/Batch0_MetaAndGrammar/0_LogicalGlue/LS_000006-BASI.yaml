  hausa:
    - don haka
  arabic:
    - لذلك
  japanese:
    - だから

grammar:
  part_of_speech:
    - conjunction
    - discourse_particle
  transitivity: null
  valency: 2          # premise → result
  classifiers_allowed: []
  derivation_rules:
    allows_compounding: true
    allows_inflection: false

predecessor:
  source_language: swahili
  source_word: basi
  derivation_notes: |
    Chosen for its strong association with conclusion and outcome framing.
    Avoids temporal ambiguity present in many "then" particles.

constraints:
  taboo: false
  register:
    - neutral
    - formal
    - explanatory
    - logical
  ambiguity_allowed: false

  forbidden_uses:
    - Temporal sequencing ("then" meaning later in time)
    - Conditional introduction (use SI)
    - Causal justification (use POKEI)
    - Contrastive pivot (use BAHW)
    - Sentence-initial filler without a prior premise

usage:
  examples: []
  context_clues:
    - Typically follows a stated premise or known condition.
    - Signals that what follows is a consequence, not a cause.
    - Often pairs naturally with evidentiality in formal reasoning.
  notes: |
    BASI marks logical or practical outcome.
    It asserts progression of reasoning, not certainty of truth.
    Truth strength is still governed by evidentiality markers.


