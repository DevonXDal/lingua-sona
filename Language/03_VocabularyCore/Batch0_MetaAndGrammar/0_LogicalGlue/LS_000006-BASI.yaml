classification:
  root_type: CV       # result / consequence connector
  core_status: core
  frequency_rank: null
  relevance_batch: 1
  cluster_group: discourse-connectors

semantics:
  primary: result marker
  secondary:
    - consequence introducer
    - logical conclusion cue
  extended:
    - inferential step marker
    - outcome framing
  domain_tags:
    - discourse
    - logic
    - consequence
    - inference

multilingual:
  english:
    - so
    - therefore
    - thus
  toki_pona:
    - la   # result-context usage
  french:
    - donc
    - alors
  spanish:
    - entonces
  chinese:
    - 所以
  swahili:
    - basi
  german:
    - also
  hindi:
    - इसलिए
  bengali:
    - তাই
  portuguese:
