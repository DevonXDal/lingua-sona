grammar:
  part_of_speech:
    - conjunction
    - conditional_particle
  transitivity: null
  valency: 2            # condition → result
  classifiers_allowed: []
  derivation_rules:
    allows_compounding: true
    allows_inflection: false

predecessor:
  source_language: latin
  source_word: si
  derivation_notes: |
    Cross-linguistically stable conditional particle.
    Selected for phonetic simplicity and global recognizability.

constraints:
  taboo: false
  register:
    - neutral
    - formal
    - technical
  ambiguity_allowed: false

  forbidden_uses:
    - Temporal sequencing ("when" in the sense of time, not condition)
    - Causal assertion (use POKEI for cause)
    - Contrastive framing (use BAHW)
    - Truth assertion without contingency
    - Standalone yes/no response particle

usage:
  examples: []
  context_clues:
    - Introduces a hypothetical or prerequisite clause.
    - Does not assert truth of either clause by itself.
    - Often paired with evidentiality in the result clause, not the condition.
  notes: |
    SI establishes conditional space.
    Truth evaluation is deferred until the condition is satisfied or rejected.
    For counterfactuals or unreal conditions, additional markers may evolve later.


