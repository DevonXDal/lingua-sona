grammar:
  part_of_speech:
    - adverb
    - temporal_particle
  transitivity: null
  valency: null
  classifiers_allowed:
    - Zaw
  derivation_rules:
    allows_compounding: true
    allows_inflection: false

predecessor:
  source_language: swahili
  source_word: sasa
  derivation_notes: |
    Chosen for clarity and strong association with present-time reference.
    Encodes temporal immediacy without implying duration or permanence.

constraints:
  taboo: false
  register:
    - neutral
    - formal
    - casual
  ambiguity_allowed: true

  forbidden_uses:
    - Spatial reference (“here” → use ISI)
    - Causal immediacy (“so now” → use BASI + SASA if needed)
    - Evidential certainty (“it is now true”)
    - Duration marking (“for now”, “nowadays” without modifiers)
    - Narrative sequencing alone (“then”)

usage:
  examples: []
  context_clues:
    - Anchors a statement to the present moment of speaking or reference.
    - May be physical-time or discourse-time, but never spatial.
    - Often pairs naturally with Zaw for explicit temporal framing.
  notes: |
    SASA marks temporal proximity, not truth, urgency, or consequence.
    Any persistence, duration, or sequencing must be expressed separately.


